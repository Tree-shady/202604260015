name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [ main, master ]

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install safety and pip-audit
      run: pip install safety pip-audit
    
    - name: Run safety scan (no API key)
      run: safety check --file=requirements.txt --full-report --output text || echo "Safety scan complete (no API key, skipping paid features)"
    
    - name: Run pip-audit
      run: pip-audit --requirement requirements.txt --format=json 2>/dev/null || pip-audit --requirement requirements.txt
    
    - name: Install Bandit
      run: pip install bandit
    
    - name: Run Bandit security scan
      run: bandit -r . -x ./tests -f text || echo "Bandit scan complete"
