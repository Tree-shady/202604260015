{% extends 'base.html' %}

{% block content %}
    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h2><i class="bi bi-tag"></i> 标签：{{ tag }}</h2>
                    <span class="badge bg-primary text-white">{{ entries|length }} 篇日记</span>
                </div>
                <div class="card-body">
                    {% if entries %}
                        <div class="list-group list-group-flush">
                            {% for entry in entries %}
                                <a href="{{ url_for('view_entry', date_str=entry.stem) }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                                    <div>
                                        <i class="bi bi-calendar3 text-primary me-2"></i>
                                        <strong>{{ entry.stem }}</strong>
                                    </div>
                                    <div class="text-muted small">
                                        <i class="bi bi-file-text me-1"></i>{{ entry.stat().st_size }} 字节
                                    </div>
                                </a>
                            {% endfor %}
                        </div>
                    {% else %}
                        <div class="text-center py-5">
                            <i class="bi bi-inbox" style="font-size: 4rem; color: #ccc;"></i>
                            <p class="text-muted mt-3">该标签下暂无日记</p>
                        </div>
                    {% endif %}
                </div>
            </div>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary mt-4">
                <i class="bi bi-arrow-left"></i> 返回首页
            </a>
        </div>
    </div>
{% endblock %}
