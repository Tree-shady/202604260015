{% extends 'base.html' %}

{% block content %}
    <h2>新建日记</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="date" class="form-label">日期</label>
            <input type="text" class="form-control" id="date" name="date" value="{{ current_date }}" required>
            <small class="form-text text-muted">格式：YYYY-MM-DD</small>
        </div>
        <div class="mb-3">
            <label for="tags" class="form-label">标签</label>
            <input type="text" class="form-control" id="tags" name="tags" placeholder="用逗号分隔多个标签">
        </div>
        <div class="mb-3">
            <label for="content" class="form-label">内容</label>
            <textarea class="form-control" id="content" name="content" rows="10" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">取消</a>
    </form>
{% endblock %}
