{% extends 'base.html' %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h2><i class="bi bi-gear"></i> 系统设置</h2>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <!-- 主题设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-palette text-primary"></i> 主题设置</h5>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="theme" id="theme-light" value="light" {% if config.theme == 'light' %}checked{% endif %}>
                                <label class="form-check-label" for="theme-light">
                                    浅色主题
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="theme" id="theme-dark" value="dark" {% if config.theme == 'dark' %}checked{% endif %}>
                                <label class="form-check-label" for="theme-dark">
                                    深色主题
                                </label>
                            </div>
                        </div>

                        <!-- 备份设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-shield-check text-primary"></i> 备份设置</h5>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="backup_enabled" id="backup-enabled" {% if config.backup_enabled %}checked{% endif %}>
                                <label class="form-check-label" for="backup-enabled">
                                    启用自动备份
                                </label>
                            </div>
                        </div>

                        <!-- 编辑设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-pencil text-primary"></i> 编辑设置</h5>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="auto_save" id="auto-save" {% if config.auto_save %}checked{% endif %}>
                                <label class="form-check-label" for="auto-save">
                                    启用自动保存
                                </label>
                            </div>
                        </div>

                        <!-- 通知设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-bell text-primary"></i> 通知设置</h5>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="notifications_enabled" id="notifications-enabled" {% if config.notifications.enabled %}checked{% endif %}>
                                <label class="form-check-label" for="notifications-enabled">
                                    启用通知
                                </label>
                            </div>
                        </div>
                        
                        <!-- 问候语设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-emoji-smile text-primary"></i> 问候语设置</h5>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" name="greetings_enabled" id="greetings-enabled" {% if config.greetings.enabled %}checked{% endif %}>
                                <label class="form-check-label" for="greetings-enabled">
                                    启用问候语
                                </label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" name="greetings_show_on_startup" id="greetings-show-on-startup" {% if config.greetings.show_on_startup %}checked{% endif %}>
                                <label class="form-check-label" for="greetings-show-on-startup">
                                    启动时显示问候语
                                </label>
                            </div>
                            {% if session.get('role') in ['admin', 'superadmin'] %}
                            <div class="mb-2">
                                <label for="greetings-source" class="form-label">问候语来源</label>
                                <select class="form-select" id="greetings-source" name="greetings_source">
                                    <option value="local" {% if config.greetings.source == 'local' %}selected{% endif %}>本地随机</option>
                                    <option value="api" {% if config.greetings.source == 'api' %}selected{% endif %}>在线API</option>
                                </select>
                                <small class="text-muted">在线API可能会因为网络原因失败，此时会自动回退到本地</small>
                            </div>
                            {% endif %}
                        </div>

                        <!-- 密码设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-key text-primary"></i> 密码设置</h5>
                            <div class="alert alert-info">
                                <i class="bi bi-info-circle"></i> 点击下方按钮修改您的密码
                            </div>
                            <a href="{{ url_for('change_password') }}" class="btn btn-outline-primary">
                                <i class="bi bi-key"></i> 修改密码
                            </a>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> 保存设置
                            </button>
                            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> 返回首页
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
