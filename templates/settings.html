{% extends 'base.html' %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h2><i class="bi bi-gear"></i> 系统设置</h2>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <!-- 主题设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-palette text-primary"></i> 主题设置</h5>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="theme" id="theme-light" value="light" {% if config.theme == 'light' %}checked{% endif %}>
                                <label class="form-check-label" for="theme-light">
                                    浅色主题
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="theme" id="theme-dark" value="dark" {% if config.theme == 'dark' %}checked{% endif %}>
                                <label class="form-check-label" for="theme-dark">
                                    深色主题
                                </label>
                            </div>
                        </div>

                        <!-- 备份设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-shield-check text-primary"></i> 备份设置</h5>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="backup_enabled" id="backup-enabled" {% if config.backup_enabled %}checked{% endif %}>
                                <label class="form-check-label" for="backup-enabled">
                                    启用自动备份
                                </label>
                            </div>
                        </div>

                        <!-- 编辑设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-pencil text-primary"></i> 编辑设置</h5>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="auto_save" id="auto-save" {% if config.auto_save %}checked{% endif %}>
                                <label class="form-check-label" for="auto-save">
                                    启用自动保存
                                </label>
                            </div>
                        </div>

                        <!-- 通知设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-bell text-primary"></i> 通知设置</h5>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="notifications_enabled" id="notifications-enabled" {% if config.notifications.enabled %}checked{% endif %}>
                                <label class="form-check-label" for="notifications-enabled">
                                    启用通知
                                </label>
                            </div>
                        </div>
                        
                        <!-- 问候语设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-emoji-smile text-primary"></i> 问候语设置</h5>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" name="greetings_enabled" id="greetings-enabled" {% if config.greetings.enabled %}checked{% endif %}>
                                <label class="form-check-label" for="greetings-enabled">
                                    启用问候语
                                </label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" name="greetings_show_on_startup" id="greetings-show-on-startup" {% if config.greetings.show_on_startup %}checked{% endif %}>
                                <label class="form-check-label" for="greetings-show-on-startup">
                                    启动时显示问候语
                                </label>
                            </div>
                            {% if session.get('role') in ['admin', 'superadmin'] %}
                            <div class="mb-2">
                                <label for="greetings-source" class="form-label">问候语来源</label>
                                <select class="form-select" id="greetings-source" name="greetings_source">
                                    <option value="local" {% if config.greetings.source == 'local' %}selected{% endif %}>本地随机</option>
                                    <option value="api" {% if config.greetings.source == 'api' %}selected{% endif %}>在线API</option>
                                </select>
                                <small class="text-muted">在线API可能会因为网络原因失败，此时会自动回退到本地</small>
                            </div>
                            {% endif %}
                        </div>

                        <!-- 存储设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-database text-primary"></i> 存储设置</h5>
                            <div class="mb-3">
                                <label class="form-label">当前存储位置</label>
                                <div class="btn-group" role="group">
                                    <input type="radio" class="btn-check" name="storage_location" id="storage-local-setting" value="local" {% if session.get('storage_type') == 'local' %}checked{% endif %}>
                                    <label class="btn btn-outline-primary" for="storage-local-setting">
                                        <i class="bi bi-hard-drive me-1"></i>本地存储
                                    </label>
                                    <input type="radio" class="btn-check" name="storage_location" id="storage-remote-setting" value="remote" {% if session.get('storage_type') == 'remote' %}checked{% endif %}>
                                    <label class="btn btn-outline-primary" for="storage-remote-setting">
                                        <i class="bi bi-cloud me-1"></i>云端存储
                                    </label>
                                </div>
                                <small class="text-muted mt-2 d-block">切换存储位置需要重新登录</small>
                            </div>
                            
                            <div class="border rounded p-3 bg-light">
                                <h6 class="mb-2">远程数据库配置</h6>
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label for="db-type" class="form-label">数据库类型</label>
                                        <select class="form-select" id="db-type" name="db_type">
                                            <option value="postgresql" {% if remote_config.get('type') == 'postgresql' %}selected{% endif %}>PostgreSQL</option>
                                            <option value="mysql" {% if remote_config.get('type') == 'mysql' %}selected{% endif %}>MySQL</option>
                                        </select>
                                    </div>
                                    <div class="col-md-8">
                                        <label for="db-host" class="form-label">数据库主机</label>
                                        <input type="text" class="form-control" id="db-host" name="db_host" placeholder="localhost" value="{{ remote_config.get('host', '') }}">
                                    </div>
                                    <div class="col-md-4">
                                        <label for="db-port" class="form-label">端口</label>
                                        <input type="text" class="form-control" id="db-port" name="db_port" placeholder="5432" value="{{ remote_config.get('port', '') }}">
                                    </div>
                                    <div class="col-md-4">
                                        <label for="db-name" class="form-label">数据库名</label>
                                        <input type="text" class="form-control" id="db-name" name="db_name" placeholder="diary" value="{{ remote_config.get('database', '') }}">
                                    </div>
                                    <div class="col-md-4">
                                        <label for="db-user" class="form-label">用户名</label>
                                        <input type="text" class="form-control" id="db-user" name="db_user" placeholder="user" value="{{ remote_config.get('username', '') }}">
                                    </div>
                                    <div class="col-md-12">
                                        <label for="db-password" class="form-label">密码</label>
                                        <input type="password" class="form-control" id="db-password" name="db_password" placeholder="输入密码">
                                    </div>
                                </div>
                                <div class="mt-3">
                                    <button type="button" class="btn btn-outline-primary" id="test-db-btn">
                                        <i class="bi bi-plug me-1"></i> 测试连接
                                    </button>
                                    <span id="db-test-result" class="ms-3"></span>
                                </div>
                                <small class="text-muted mt-2 d-block">支持 PostgreSQL 和 MySQL 数据库</small>
                            </div>
                        </div>

                        <!-- 密码设置 -->
                        <div class="mb-4">
                            <h5 class="mb-3"><i class="bi bi-key text-primary"></i> 密码设置</h5>
                            <div class="alert alert-info">
                                <i class="bi bi-info-circle"></i> 点击下方按钮修改您的密码
                            </div>
                            <a href="{{ url_for('change_password') }}" class="btn btn-outline-primary">
                                <i class="bi bi-key"></i> 修改密码
                            </a>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> 保存设置
                            </button>
                            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> 返回首页
                            </a>
                        </div>
                    </form>

                    <script>
                    document.getElementById('test-db-btn').addEventListener('click', function() {
                        const btn = this;
                        const resultSpan = document.getElementById('db-test-result');
                        
                        btn.disabled = true;
                        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>测试中...';
                        resultSpan.innerHTML = '';
                        
                        const dbType = document.getElementById('db-type').value;
                        const dbHost = document.getElementById('db-host').value;
                        const dbPort = document.getElementById('db-port').value;
                        const dbName = document.getElementById('db-name').value;
                        const dbUser = document.getElementById('db-user').value;
                        const dbPassword = document.getElementById('db-password').value;
                        
                        fetch('/api/test-database', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                type: dbType,
                                host: dbHost,
                                port: dbPort,
                                database: dbName,
                                username: dbUser,
                                password: dbPassword
                            })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                resultSpan.innerHTML = '<span class="text-success"><i class="bi bi-check-circle me-1"></i>' + data.message + '</span>';
                            } else {
                                resultSpan.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle me-1"></i>' + data.message + '</span>';
                            }
                        })
                        .catch(error => {
                            resultSpan.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle me-1"></i>请求失败: ' + error.message + '</span>';
                        })
                        .finally(() => {
                            btn.disabled = false;
                            btn.innerHTML = '<i class="bi bi-plug me-1"></i> 测试连接';
                        });
                    });
                    </script>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
