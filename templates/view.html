{% extends 'base.html' %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h2><i class="bi bi-calendar3"></i> {{ date_str }} 的日记</h2>
                    <a href="{{ url_for('edit_entry', date_str=date_str) }}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i> 编辑
                    </a>
                </div>
                <div class="card-body">
                    {% if timestamp %}
                        <div class="alert alert-info mb-4">
                            <i class="bi bi-clock-history me-2"></i>{{ timestamp }}
                        </div>
                    {% endif %}

                    {% if tags %}
                        <div class="mb-4">
                            <h5 class="mb-2"><i class="bi bi-tags text-primary"></i> 标签</h5>
                            <div class="d-flex flex-wrap gap-2">
                                {% for tag in tags %}
                                    <a href="{{ url_for('view_tag', tag=tag) }}" class="btn btn-sm btn-outline-primary">
                                        {{ tag }}
                                    </a>
                                {% endfor %}
                            </div>
                        </div>
                    {% endif %}

                    <div class="mb-4">
                        <h5 class="mb-2"><i class="bi bi-file-text text-primary"></i> 内容</h5>
                        <div class="bg-light p-4 rounded">
                            <pre class="text-wrap" style="white-space: pre-wrap; font-family: inherit; background: none; border: none; padding: 0;">{{ content }}</pre>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="{{ url_for('edit_entry', date_str=date_str) }}" class="btn btn-primary">
                            <i class="bi bi-pencil-square"></i> 编辑
                        </a>
                        <form method="POST" action="{{ url_for('delete_entry', date_str=date_str) }}" onsubmit="return confirm('确定要删除这篇日记吗？');" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger">
                                <i class="bi bi-trash"></i> 删除
                            </button>
                        </form>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> 返回
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
