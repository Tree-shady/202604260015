{% extends 'base.html' %}

{% block content %}
    <h2>{{ date_str }} 的日记</h2>
    
    {% if timestamp %}
        <div class="text-muted mb-3">{{ timestamp }}</div>
    {% endif %}
    
    {% if tags %}
        <div class="mb-3">
            <h5>标签：</h5>
            <div class="d-flex flex-wrap gap-2">
                {% for tag in tags %}
                    <a href="{{ url_for('view_tag', tag=tag) }}" class="btn btn-outline-secondary btn-sm">
                        {{ tag }}
                    </a>
                {% endfor %}
            </div>
        </div>
    {% endif %}
    
    <div class="card mb-4">
        <div class="card-body">
            <pre class="card-text">{{ content }}</pre>
        </div>
    </div>
    
    <div class="d-flex gap-2">
        <a href="{{ url_for('edit_entry', date_str=date_str) }}" class="btn btn-primary">编辑</a>
        <form method="POST" action="{{ url_for('delete_entry', date_str=date_str) }}" onsubmit="return confirm('确定要删除这篇日记吗？');">
            <button type="submit" class="btn btn-danger">删除</button>
        </form>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">返回</a>
    </div>
{% endblock %}
