{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="bi bi-key"></i></h1>
            <h2>修改密码</h2>
            <p>请输入您的旧密码和新密码</p>
        </div>

        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="old_password" class="form-label">
                    <i class="bi bi-lock me-2"></i>旧密码
                </label>
                <input type="password" class="form-control" id="old_password" name="old_password" 
                       placeholder="请输入旧密码" required autofocus>
            </div>

            <div class="mb-3">
                <label for="new_password" class="form-label">
                    <i class="bi bi-lock-fill me-2"></i>新密码
                </label>
                <input type="password" class="form-control" id="new_password" name="new_password" 
                       placeholder="请输入新密码（至少6个字符）" required>
            </div>

            <div class="mb-3">
                <label for="confirm_password" class="form-label">
                    <i class="bi bi-lock-fill me-2"></i>确认新密码
                </label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                       placeholder="请再次输入新密码" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-save me-2"></i>保存修改
                </button>
            </div>
        </form>

        <div class="auth-footer">
            <p><a href="{{ url_for('index') }}">返回首页</a></p>
        </div>
    </div>
</div>

<style>
    .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
    }

    .auth-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        padding: 40px;
        width: 100%;
        max-width: 420px;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .auth-header h1 {
        font-size: 48px;
        color: #667eea;
        margin-bottom: 10px;
    }

    .auth-header h2 {
        font-size: 24px;
        color: #333;
        margin-bottom: 8px;
    }

    .auth-header p {
        color: #666;
        font-size: 14px;
    }

    .auth-form .form-label {
        font-weight: 500;
        color: #333;
    }

    .auth-form .form-control {
        padding: 12px 15px;
        border-radius: 10px;
        border: 2px solid #e0e0e0;
        transition: all 0.3s;
    }

    .auth-form .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }

    .auth-form .btn {
        padding: 12px;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.3s;
    }

    .auth-form .btn-primary {
        background: #667eea;
        border: none;
    }

    .auth-form .btn-primary:hover {
        background: #5a6fd8;
        transform: translateY(-2px);
    }

    .auth-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
    }

    .auth-footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}
